<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ONNX Inference</title>
        <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=" />
        <style>
            .container {
                display: flex;
                gap: 20px;
                height: calc(100vh - 20px);
            }
            .left-column {
                display: flex;
                flex-direction: column;
            }
            .right-column {
                width: 300px;
                display: flex;
                flex-direction: column;
                flex: 1;
            }
            .right-column h3 {
                margin: 0;
                padding-bottom: 10px;
            }
            #logs {
                background: #f5f5f5;
                border: 1px solid #ccc;
                padding: 10px;
                flex: 1;
                overflow-y: auto;
                font-family: monospace;
                font-size: 12px;
                white-space: pre-wrap;
            }
            .canvas-container {
                display: flex;
                gap: 20px;
            }
            #model-controls {
                display: none;
                align-items: center;
                gap: 10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="left-column">
                <div id="load-controls">
                    <table>
                        <tr>
                            <td>
                                <label for="zip-file">Ground truth data:</label>
                            </td>
                            <td>
                                <input
                                    type="file"
                                    id="zip-file"
                                    accept=".zip"
                                />
                            </td>
                        </tr>
                        <tr>
                            <td><label for="model-file">Model:</label></td>
                            <td>
                                <input
                                    type="file"
                                    id="model-file"
                                    accept=".onnx"
                                />
                            </td>
                        </tr>
                    </table>
                    <button id="load-button">Load</button>
                </div>

                <div id="model-controls">
                    <label for="frame">Frame</label>
                    <input type="range" id="frame" />
                    <button id="run-button">Run</button>
                </div>

                <div class="canvas-container">
                    <div class="canvas-wrapper">
                        <h3>Original</h3>
                        <canvas id="original" width="512" height="512"></canvas>
                    </div>
                    <div class="canvas-wrapper">
                        <h3>Prediction</h3>
                        <canvas
                            id="predicted"
                            width="512"
                            height="512"
                        ></canvas>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <h3>Logs</h3>
                <div id="logs"></div>
            </div>
        </div>

        <script type="module" src="main.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.25.0-dev.20260307-d626b568e0/dist/ort.webgpu.min.js"></script>
    </body>
</html>
